name: Spotify Pipeline

on:
  schedule:
    - cron: '0 * * * *'   # Runs every hour
  workflow_dispatch:        # Manual trigger anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      ENV: cloud
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Run tracks pipeline
        run: python extract_tracks.py

      - name: Run artists pipeline
        run: python extract_artists.py

      - name: Enrich unknown artist genres
        run: python enrich_artists.py
        continue-on-error: true

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: Run dbt models
        working-directory: spotify_transforms
        env:
          DBT_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: dbt run --profiles-dir .
